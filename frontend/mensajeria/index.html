<!-- Contenido de la sección Mensajería (sin etiquetas html/body/head) -->
<div class="messaging-section">
  <div class="messaging-container">
    <!-- Lista de conversaciones -->
    <div class="conversations-list">
      <h2>Mensajes</h2>
      <input type="text" id="search-conversations" placeholder="Buscar conversaciones..." class="search-conversations" />
      <div class="conversations" id="conversations-list">
        <!-- Prototipos (fallback si el JS no llega a ejecutarse) -->
        <div class="conversation-item active">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=CyberNeon" alt="@CyberNeon" class="conversation-avatar" />
          <div class="conversation-info">
            <p class="conversation-name">@CyberNeon</p>
            <p class="conversation-preview">Me encantó tu recomendación de Cyberpunk</p>
          </div>
        </div>
        <div class="conversation-item">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=GamingLegend" alt="@GamingLegend" class="conversation-avatar" />
          <div class="conversation-info">
            <p class="conversation-name">@GamingLegend</p>
            <p class="conversation-preview">Te recomiendo Red Dead 2</p>
          </div>
        </div>
        <div class="conversation-item">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=CinemaLover" alt="@CinemaLover" class="conversation-avatar" />
          <div class="conversation-info">
            <p class="conversation-name">@CinemaLover</p>
            <p class="conversation-preview">Blade Runner 2049 es una obra maestra</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Área de chat -->
    <div class="chat-area">
      <div class="chat-header" id="chat-header">
        <h3>Selecciona una conversación</h3>
      </div>
      <div class="messages-container" id="messages-container">
        <!-- Prototipo de chat (fallback) -->
        <div class="message received">
          <div>
            <div class="message-bubble">Hola! ¿Qué tal?</div>
            <div class="message-timestamp">14:30</div>
          </div>
        </div>
        <div class="message sent">
          <div>
            <div class="message-bubble">Muy bien, ¿y tú?</div>
            <div class="message-timestamp">14:31</div>
          </div>
        </div>
        <p class="no-chat-selected" style="margin-top: 18px;">Selecciona un usuario para empezar a chatear</p>
      </div>
      <div class="message-input-area" id="message-input-area" style="display: none;">
        <input type="text" id="message-input" placeholder="Escribe un mensaje..." />
        <button id="send-btn" class="send-btn">↗️</button>
      </div>
    </div>
  </div>
</div>
