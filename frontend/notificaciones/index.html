<!-- Contenido de la sección Notificaciones (sin etiquetas html/body/head) -->
<div class="notifications-section">
  <div class="notifications-header">
    <h1>Notificaciones</h1>
    <div class="notification-filters">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="like">❤️ Likes</button>
      <button class="filter-btn" data-filter="comment">💬 Comentarios</button>
      <button class="filter-btn" data-filter="follow">👤 Seguidores</button>
    </div>
  </div>

  <div class="notifications-list" id="notifications-list">
    <!-- Las notificaciones se renderizarán aquí -->
  </div>
</div>
